name: Publish URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: Paper, DOI, preprint, PubMed, or project URL
        required: true
        type: string
      title:
        description: Optional title override
        required: false
        type: string
      note:
        description: Optional curator note
        required: false
        type: string
      tags:
        description: Optional free-text tag hints
        required: false
        type: string
      code:
        description: Optional code, project, dataset, or benchmark URL
        required: false
        type: string
permissions:
  actions: write
  contents: write

concurrency:
  group: publish-url
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Authorize direct publisher
        env:
          ACTOR: ${{ github.actor }}
          DIRECT_PUBLISHERS: ${{ vars.ENZYME_PAPERS_DIRECT_PUBLISHERS }}
        run: |
          if [ -z "$DIRECT_PUBLISHERS" ]; then
            echo "::error::Repository variable ENZYME_PAPERS_DIRECT_PUBLISHERS is required for direct publishing."
            exit 1
          fi
          allowed=",$DIRECT_PUBLISHERS,"
          if [[ "$allowed" != *",$ACTOR,"* ]]; then
            echo "::error::${ACTOR} is not listed in ENZYME_PAPERS_DIRECT_PUBLISHERS."
            exit 1
          fi
      - uses: ./.github/actions/setup-project
      - name: Publish paper metadata
        env:
          PAPER_URL: ${{ inputs.url }}
          PAPER_TITLE: ${{ inputs.title }}
          PAPER_NOTE: ${{ inputs.note }}
          PAPER_TAGS: ${{ inputs.tags }}
          PAPER_CODE: ${{ inputs.code }}
          REVIEWER: ${{ github.actor }}
        run: |
          args=(--url "$PAPER_URL" --reviewer "$REVIEWER" --fetch-metadata)
          if [ -n "$PAPER_TITLE" ]; then args+=(--title "$PAPER_TITLE"); fi
          if [ -n "$PAPER_NOTE" ]; then args+=(--note "$PAPER_NOTE"); fi
          if [ -n "$PAPER_TAGS" ]; then args+=(--tags "$PAPER_TAGS"); fi
          if [ -n "$PAPER_CODE" ]; then args+=(--code "$PAPER_CODE"); fi
          python scripts/publish_url.py "${args[@]}" | tee publish-result.txt
      - name: Generate docs
        run: python scripts/build_docs.py
      - name: Validate metadata
        run: python scripts/validate_papers.py
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Commit direct publish
        id: commit
        run: |
          git add data README.md docs
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No repository changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish paper from URL"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Dispatch site deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/actions/workflows/site.yml/dispatches" \
            -d '{"ref":"main"}'
      - name: Summary
        run: |
          {
            echo "## Publish URL"
            echo
            cat publish-result.txt
            echo
            echo "Repository changes committed: ${{ steps.commit.outputs.changed }}"
            echo
            echo "Site deployment dispatched: ${{ steps.commit.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
